name: CI

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: admin
            path: admin
            script: build
          - name: client
            path: client
            script: build
          - name: server
            path: server
            script: build
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install
        run: npm ci
        working-directory: ${{ matrix.path }}

      - name: Build
        run: npm run ${{ matrix.script }}
        working-directory: ${{ matrix.path }}
